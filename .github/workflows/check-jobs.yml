name: Check TherapyNotes Jobs

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
concurrency:
  group: check-jobs
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          USAJOBS_EMAIL: ${{ secrets.USAJOBS_EMAIL }}
          USAJOBS_AUTH_KEY: ${{ secrets.USAJOBS_AUTH_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESUME_VAULT_TOKEN: ${{ secrets.RESUME_VAULT_TOKEN }}
          CANDIDATE_NAME: ${{ secrets.CANDIDATE_NAME }}
          AI_PIPELINE_ENABLED: ${{ vars.AI_PIPELINE_ENABLED }}
          PREFILTER_PROVIDER_FORMAT: openai
          PREFILTER_BASE_URL: https://api.groq.com/openai/v1/chat/completions
          PREFILTER_MODEL: llama-3.3-70b-versatile
          PREFILTER_API_KEY: ${{ secrets.PREFILTER_API_KEY }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update seen jobs"
          file_pattern: seen-jobs.json application-tracker.json digest-state.json
